spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stock_trading?useSSL=false&serverTimezone=UTC
    username: root
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production}
    expiration: 86400000
  stock:
    alpha-vantage-key: ${ALPHA_VANTAGE_KEY:demo}
